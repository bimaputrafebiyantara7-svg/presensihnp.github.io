    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================

        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI BAWAH INI:
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyo5iQVINgUbfzJKLr75w5X6FvHetvJ7d7e4mQdt-w0ITFQTknLQFgaCvoQwWnPOPTQ3w/exec"; 

        const apiCall = async (action, data = {}) => {
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, data: data })
                });
                const result = await response.json();
                if (result && result.status === 'Error') throw new Error(result.message);
                return result;
            } catch (err) {
                console.error("API Error:", err);
                throw err;
            }
        };

        // --- UTILS ---
        function getDistance(lat1, lon1, lat2, lon2) {
            if (lat1 === null || lon1 === null || lat2 === null || lon2 === null) return null;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        const parseDateString = (dStr) => {
            if (!dStr) return 0;
            const months = { 'Jan': 0, 'Januari': 0, 'Feb': 1, 'Februari': 1, 'Mar': 2, 'Maret': 2, 'Apr': 3, 'April': 3, 'Mei': 4, 'May': 4, 'Jun': 5, 'Juni': 5, 'Jul': 6, 'Juli': 6, 'Agu': 7, 'Agustus': 7, 'Aug': 7, 'Sep': 8, 'September': 8, 'Okt': 9, 'Oktober': 9, 'Oct': 9, 'Nov': 10, 'November': 10, 'Des': 11, 'Desember': 11, 'Dec': 11 };
            const cleanStr = dStr.replace(/,/g, '');
            const parts = cleanStr.split(' ');
            let startIdx = 0;
            if (isNaN(parseInt(parts[0]))) { startIdx = 1; }
            if (parts.length < startIdx + 3) return 0;
            const day = parseInt(parts[startIdx]);
            const monthStr = parts[startIdx + 1];
            let month = months[monthStr];
            if (month === undefined && monthStr) {
                const capMonth = monthStr.charAt(0).toUpperCase() + monthStr.slice(1).toLowerCase();
                month = months[capMonth] ?? 0;
            }
            const year = parseInt(parts[startIdx + 2]);
            return new Date(year, month, day).getTime();
        };

        const cleanTime = (rawTime) => {
            if (!rawTime) return "--:--";
            if (/^\d{1,2}:\d{2}/.test(rawTime)) return rawTime;
            if (typeof rawTime === 'string' && rawTime.includes('GMT')) {
                const date = new Date(rawTime);
                if (!isNaN(date)) {
                    return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace('.', ':');
                }
            }
            return rawTime;
        };

        const calculateTimeDiff = (time1, time2) => {
            if(!time1 || !time2) return null;
            const [h1, m1] = time1.split(':').map(Number);
            const [h2, m2] = time2.split(':').map(Number);
            let minutes1 = h1 * 60 + m1;
            let minutes2 = h2 * 60 + m2;
            if (minutes2 < minutes1) minutes2 += 24 * 60; 
            let diff = minutes2 - minutes1;
            const hours = Math.floor(diff / 60);
            const minutes = diff % 60;
            return `${hours} Jam ${minutes} Menit`;
        };

        const getWorkingDuration = (currentLog, allLogsInDay) => {
            const loc = (currentLog.loc || "").toLowerCase();
            if (!loc.includes("pulang")) return null;

            let category = 'full time';
            if (loc.includes('setengah hari')) category = 'setengah hari';
            else if (loc.includes('khusus')) category = 'khusus';
            else if (loc.includes('ekstra')) category = 'ekstra';

            const matchingHadir = allLogsInDay.find(l => {
                const lLoc = (l.loc || "").toLowerCase();
                return lLoc.includes("hadir") && lLoc.includes(category);
            });

            if (matchingHadir) {
                return calculateTimeDiff(matchingHadir.time, currentLog.time);
            }
            return null;
        };

        const calculateStats = (dataList) => {
            let fullTimeCount = 0, halfDayCount = 0, permitCount = 0, khususCount = 0, ekstraCount = 0;
            const grouped = {};

            dataList.forEach(p => {
                const loc = (p.loc || "").toLowerCase();
                const key = p.date;
                
                let type = 'unknown';
                if (loc.includes('full time')) type = 'full';
                else if (loc.includes('setengah hari')) type = 'half';
                else if (loc.includes('izin')) type = 'izin';
                else if (loc.includes('khusus')) type = 'khusus';
                else if (loc.includes('ekstra')) type = 'ekstra';

                if (!grouped[key]) grouped[key] = { full:[], half:[], izin:[], khusus:[], ekstra:[] };
                grouped[key][type].push(loc);
            });

            Object.values(grouped).forEach(dayGroup => {
                if (dayGroup.izin.length > 0) permitCount += dayGroup.izin.length;

                const hasFullHadir = dayGroup.full.some(l => l.includes('| hadir |'));
                const hasFullPulang = dayGroup.full.some(l => l.includes('| pulang |'));
                if (hasFullHadir && hasFullPulang) fullTimeCount++;

                const hasHalfHadir = dayGroup.half.some(l => l.includes('| hadir |'));
                const hasHalfPulang = dayGroup.half.some(l => l.includes('| pulang |'));
                if (hasHalfHadir && hasHalfPulang) halfDayCount++;

                const khususHadirCount = dayGroup.khusus.filter(l => l.includes('| hadir |')).length;
                const khususPulangCount = dayGroup.khusus.filter(l => l.includes('| pulang |')).length;
                khususCount += Math.min(khususHadirCount, khususPulangCount);

                const ekstraHadirCount = dayGroup.ekstra.filter(l => l.includes('| hadir |')).length;
                const ekstraPulangCount = dayGroup.ekstra.filter(l => l.includes('| pulang |')).length;
                ekstraCount += Math.min(ekstraHadirCount, ekstraPulangCount);
            });

            const total = fullTimeCount + halfDayCount + permitCount + khususCount + ekstraCount;
            return { total, fullTimeCount, halfDayCount, permitCount, khususCount, ekstraCount };
        };

        const formatLocationData = (locStr) => {
            if (!locStr) return { address: "-", badges: [] };
            const parts = locStr.split('|').map(s => s.trim());
            const badges = [];
            
            let address = parts[0]; 
            
            parts.forEach((part, index) => {

                if (part.includes("TERLAMBAT")) {

                } else if (part.includes("TEPAT WAKTU")) {
                    badges.push(<span key={index} className="px-2 py-0.5 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 text-[8px] font-black uppercase tracking-wider flex items-center gap-1 mt-1 w-fit">{part}</span>);
                } else if (part.includes("OVERTIME")) {
                    badges.push(<span key={index} className="px-2 py-0.5 rounded bg-amber-500/20 text-amber-400 border border-amber-500/30 text-[8px] font-black uppercase tracking-wider flex items-center gap-1 mt-1 w-fit">{part}</span>);
                } else if (part.includes("PULANG NORMAL")) {
                    badges.push(<span key={index} className="px-2 py-0.5 rounded bg-blue-500/20 text-blue-400 border border-blue-500/30 text-[8px] font-black uppercase tracking-wider flex items-center gap-1 mt-1 w-fit">{part}</span>);
                }
            });
            
            return { address, badges };
        };

            const globalStats = useMemo(() => calculateStats(presences), [presences]);

            const filteredRawPresences = useMemo(() => {

                if (filterDay || filterMonth || filterYear) {
                    data = data.filter(p => {
                        const timestamp = parseDateString(p.date);
                        if (!timestamp) return false;
                        const dateObj = new Date(timestamp);
                        const pDay = dateObj.getDate();
                        const pMonth = dateObj.getMonth();
                        const pYear = dateObj.getFullYear();
                        let matchDay = true, matchMonth = true, matchYear = true;
                        
                        if (filterDay) { const fDay = parseInt(filterDay); if (!isNaN(fDay)) matchDay = pDay === fDay; }
                        if (filterMonth) {
                             const cleanInput = filterMonth.toLowerCase().trim();
                             let targetIdx = -1;
                             const num = parseInt(cleanInput);
                             if (!isNaN(num) && num >= 1 && num <= 12) targetIdx = num - 1;
                             else {
                                 const monthMap = { 'jan':0,'januari':0,'feb':1,'februari':1,'mar':2,'maret':2,'apr':3,'april':3,'mei':4,'may':4,'jun':5,'juni':5,'jul':6,'juli':6,'agu':7,'agustus':7,'aug':7,'sep':8,'september':8,'okt':9,'oktober':9,'nov':10,'november':10,'des':11,'desember':11 };
                                 if (monthMap[cleanInput] !== undefined) targetIdx = monthMap[cleanInput];
                                 else { const shortInput = cleanInput.substring(0,3); if(monthMap[shortInput]!==undefined) targetIdx=monthMap[shortInput]; }
                             }
                             if(targetIdx!==-1) matchMonth = pMonth === targetIdx; else matchMonth = false;
                        }
                        if (filterYear) { const fYear = parseInt(filterYear); if (!isNaN(fYear)) matchYear = pYear === fYear; }
                        return matchDay && matchMonth && matchYear;
                    });
                }
                return [...data].sort((a, b) => {
                    const dateA = parseDateString(a.date);
                    const dateB = parseDateString(b.date);
                    if (dateA !== dateB) return sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
                    const tPartsA = (a.time || "00:00").split(':');
                    const tPartsB = (b.time || "00:00").split(':');
                    const minutesA = (parseInt(tPartsA[0]) || 0) * 60 + (parseInt(tPartsA[1]) || 0);
                    const minutesB = (parseInt(tPartsB[0]) || 0) * 60 + (parseInt(tPartsB[1]) || 0);
                    return sortOrder === 'desc' ? minutesB - minutesA : minutesA - minutesB;

                    streamRef.current = stream;

                        if (videoRef.current) {
                            clearInterval(tryPlay);
                            videoRef.current.srcObject = stream;
                            videoRef.current.play().catch(e => console.error("Play error:", e));
                        }
                    }, 100);
                    setTimeout(() => clearInterval(tryPlay), 3000);
                };

                try { 
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false }); 
                    attachStream(stream);
                } catch (err1) { 
                    try {
                        const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                        attachStream(fallbackStream);
                    } catch (err2) {
                        setIsRequestingCamera(false); 
                        setCameraFailed(true);
                        console.error("Camera Error:", err2);
                        if (err2.name === 'NotAllowedError' || err2.name === 'PermissionDeniedError') setCameraErrorMsg("Browser memblokir kamera. Ubah izin Kamera menjadi 'Allow/Izinkan'.");
                        else if (err2.name === 'NotFoundError' || err2.name === 'DevicesNotFoundError') setCameraErrorMsg("Kamera tidak terdeteksi.");
                        else if (err2.name === 'NotReadableError' || err2.name === 'TrackStartError') setCameraErrorMsg("Kamera sedang digunakan aplikasi lain.");
                        else setCameraErrorMsg("Sistem kamera bermasalah: " + err2.message);
                    }
                } 
            };

            const handleNativeCamera = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; 
                            let width = img.width;
                            let height = img.height;
                            if (width > MAX_WIDTH) {
                                height = Math.round((height * MAX_WIDTH) / width);
                                width = MAX_WIDTH;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            setFallbackImage(compressedDataUrl);
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            <p className="text-white text-[10px] font-black tracking-widest uppercase animate-pulse">Menunggu Izin Kamera...</p>
            <p className="text-emerald-400 text-[8px] mt-2 uppercase font-bold text-center px-4">Silahkan klik "Allow/Izinkan" pada pop-up browser Anda</p>
        </div>
    )}

    {/* === BAGIAN YANG DIUBAH MULAI DARI SINI === */}
    {!cameraFailed ? (
        <video ref={videoRef} id="video-element" autoPlay playsInline muted className="w-full h-full object-cover transform scale-x-[-1]"></video>

        <img src={fallbackImage} className="w-full h-full object-cover transform scale-x-[-1]" alt="Captured" />

        <div className="w-full h-full flex flex-col items-center justify-center bg-black/80 p-4 text-center z-10 relative">

            <p className="text-[8px] text-rose-300 mb-5 px-2 leading-relaxed">{cameraErrorMsg}</p>
            
            {/* Tombol Utama: Paksa Coba Lagi Live Camera */}
            <button onClick={startCamera} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform mb-3 w-full max-w-[220px]">
                <i className="fas fa-sync-alt mr-2"></i> IZINKAN & COBA LAGI
            </button>

            <div className="w-full max-w-[220px] flex items-center justify-center gap-2 mb-3 opacity-40">
                <div className="h-px bg-white flex-1"></div>
                <span className="text-[7px] text-white uppercase font-bold tracking-widest">ATAU (JIKA TETAP GAGAL)</span>
                <div className="h-px bg-white flex-1"></div>
            </div>

            {/* Tombol Alternatif Terakhir: Kamera Bawaan HP */}
            <label className="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-5 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest cursor-pointer shadow-lg active:scale-95 transition-transform w-full max-w-[220px] text-center block">
                <i className="fas fa-camera mr-2"></i> BUKA KAMERA BAWAAN
                <input type="file" accept="image/*" capture="user" className="hidden" onChange={handleNativeCamera} />
            </label>
        </div>
    )}
    {/* === BAGIAN YANG DIUBAH SELESAI SAMPAI SINI === */}

    <div className="absolute inset-0 border-[4px] border-white/10 rounded-[1.3rem] pointer-events-none z-20"></div>

                                    <div className="absolute inset-0 border-[4px] border-white/10 rounded-[1.3rem] pointer-events-none z-20"></div>
                                    
                                    <div className="absolute top-4 left-4 flex flex-col gap-1.5 z-30 pointer-events-none">
                                            <div className={`bg-black/60 backdrop-blur-sm px-3 py-1.5 rounded-lg border border-white/10 flex items-center gap-2 ${isOutOfRange ? 'text-rose-400' : 'text-emerald-400'}`}>
                                                <i className="fas fa-satellite-dish text-[10px]"></i>
                                                <span className="text-[9px] font-black tracking-widest uppercase">
                                                    {distanceToTarget !== null ? `${distanceToTarget.toFixed(3)} KM` : 'Locating...'}
                                                </span>
                                            </div>
                                            <div className={`bg-black/60 backdrop-blur-sm px-3 py-1.5 rounded-lg border border-white/10 flex items-center gap-2 ${isGpsPoor ? 'text-amber-400' : 'text-blue-400'}`}>
                                                <i className="fas fa-crosshairs text-[10px]"></i>
                                                <span className="text-[9px] font-black tracking-widest uppercase">
                                                    Acc: {coords.accuracy ? Math.round(coords.accuracy) : '--'}M
                                                </span>
                                            </div>
                                    </div>

                                    <div className="absolute top-4 right-4 z-30 pointer-events-none">
                                            <div className="bg-emerald-600/90 px-2.5 py-1 rounded-md flex items-center gap-2 shadow-lg border border-emerald-400/50">
                                                <div className="w-1.5 h-1.5 rounded-full bg-white animate-ping"></div>
                                                <span className="text-[8px] text-white font-black uppercase tracking-tighter">System Online</span>
                                            </div>
                                    </div>

                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 pointer-events-none opacity-20">
                                            <p className="text-white font-black text-4xl uppercase tracking-[0.5em] select-none">HNP</p>
                                    </div>

                                    <div className="absolute bottom-4 left-4 right-4 z-30 pointer-events-none flex justify-between items-end">
                                            <div className="bg-black/60 backdrop-blur-md px-3 py-2 rounded-xl border border-white/10 shadow-lg">
                                                <p className="text-[7px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Coordinates</p>
                                                <p className="text-[9px] text-white font-mono font-black tracking-tighter leading-none">
                                                    {coords.lat ? coords.lat.toFixed(6) : '--.------'}, {coords.lng ? coords.lng.toFixed(6) : '--.------'}
                                                </p>
                                            </div>
                                            <div className="bg-rose-600/80 px-2 py-0.5 rounded-md flex items-center gap-1.5 border border-rose-400/40">
                                                <div className="w-1 h-1 rounded-full bg-white"></div>
                                                <span className="text-[7px] text-white font-black uppercase">Live</span>
                                            </div>
                                    </div>
                                </div>

                                {presenceType !== 'Izin' && (
                                    <div className="mb-6 animate-in">
                                        <div id="user-map" className="shadow-2xl"></div>
                                    </div>
                                )}

                                <div className="space-y-4">
                                    {(presenceType === 'Izin' || (presenceType === 'Hadir' && (selectedDuration === 'Khusus' || selectedDuration === 'Ekstra'))) && (
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest ml-2 flex items-center gap-2">
                                                <span className={selectedDuration === 'Khusus' ? 'text-cyan-400' : (selectedDuration === 'Ekstra' ? 'text-orange-400' : 'text-purple-400')}>
                                                    {selectedDuration === 'Khusus' ? 'Deskripsi Aktivitas Khusus' : (selectedDuration === 'Ekstra' ? 'Deskripsi Tugas Tambahan' : 'Dokumentasi Alasan Izin')}
                                                </span>
                                            </label>
                                            <textarea className="w-full p-4 rounded-2xl os-input text-sm border border-white/10 focus:border-gold-light/50" rows="3" placeholder="Masukkan keterangan secara lengkap..." value={permitReason} onChange={e => setPermitReason(e.target.value)}></textarea>
                                        </div>
                                    )}

                                    {locationErrorMsg && (
                                        <div className="bg-rose-500/10 border border-rose-500/30 p-3 rounded-xl flex items-center gap-3 animate-in">
                                            <div className="w-8 h-8 rounded-full bg-rose-500/20 flex items-center justify-center text-rose-500 shrink-0"><i className="fas fa-exclamation-triangle"></i></div>
                                            <div className="flex-1">
                                                <p className="text-[9px] text-rose-200 font-bold leading-snug">{locationErrorMsg}</p>
                                                <button onClick={handleRefreshGPS} className="mt-1 bg-rose-600 hover:bg-rose-500 text-white text-[9px] font-black px-3 py-1 rounded-lg uppercase tracking-widest transition-all">REFRESH GPS</button>
                                            </div>
                                        </div>
                                    )}

                                    {isOutOfRange && (
                                        <div className="bg-rose-500/10 border border-rose-500/30 p-3 rounded-xl flex items-center gap-3 animate-in">
                                            <div className="w-8 h-8 rounded-full bg-rose-500/20 flex items-center justify-center text-rose-500 shrink-0"><i className="fas fa-map-marker-alt"></i></div>
                                            <p className="text-[9px] text-rose-200 font-bold leading-snug">
                                                AKSES DITOLAK: Anda berada di luar jangkauan (500m) dari titik pusat presensi.
                                            </p>
                                        </div>
                                    )}
                                    {/* --- TAMBAHAN: INFO JIKA BYPASS AKTIF --- */}
{(distanceToTarget > 0.5 && currentUser?.bypassGeo && presenceType !== 'Izin') && (
    <div className="bg-amber-500/10 border border-amber-500/30 p-3 rounded-xl flex items-center gap-3 animate-in">
        <div className="w-8 h-8 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-500 shrink-0"><i className="fas fa-unlock"></i></div>
        <p className="text-[9px] text-amber-200 font-bold leading-snug">
            INFO: Anda berada di luar radius, namun <span className="text-white">Admin telah membuka akses</span> untuk Anda. Silahkan lanjutkan.
        </p>
    </div>
)}

                                    <button 
                                        onClick={doAbsen} 
                                        disabled={isLoading || isOutOfRange || isGpsPoor || isLocationMissing} 
                                        className={`w-full py-5 rounded-2xl font-black uppercase tracking-[0.3em] shadow-xl flex justify-center items-center gap-3 transition-all active:scale-95 text-xs 
                                            ${(isLoading || isOutOfRange || isGpsPoor || isLocationMissing) ? 'btn-disabled' : 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-emerald-500/20'}`}
                                    >
                                            {isLoading ? <div className="loader"></div> : (
                                                <>
                                                    <i className={`fas fa-${isOutOfRange ? 'times-circle' : (isLocationMissing ? 'search-location' : 'fingerprint')} text-lg`}></i> 
                                                    {isLocationMissing ? 'MENCARI LOKASI...' : (isOutOfRange ? 'OUT OF RADIUS' : 'SUBMIT DATA PRESENSI')}
                                                </>
                                            )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isProfileModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 modal-overlay animate-in" onClick={() => setIsProfileModalOpen(false)}>
                            <div className="os-window w-full max-w-sm p-8 rounded-[3rem] text-center relative border border-white/10 shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setIsProfileModalOpen(false)} className="absolute top-6 right-6 text-slate-400 hover:text-white text-xl transition-colors"><i className="fas fa-times"></i></button>
                                
                                <div className="flex flex-col items-center">
                                    <div className="w-32 h-32 rounded-[2rem] border-4 border-gold-light overflow-hidden shadow-2xl mb-6 cursor-pointer transform hover:scale-105 transition-transform relative group">
                                            <img src={isEditingProfile ? editForm.profilePic : currentUser.profilePic} className="w-full h-full object-cover" alt="Profile" onClick={() => !isEditingProfile && setIsPhotoZoomOpen(true)} />
                                            {isEditingProfile && (
                                                <div className="absolute inset-0 bg-black/50 flex items-center justify-center">
                                                    <label className="cursor-pointer text-white text-xs font-bold uppercase"><i className="fas fa-camera text-2xl mb-1 block"></i>Ganti</label>
                                                    <input type="file" accept="image/*" onChange={handleEditPhotoChange} className="absolute inset-0 opacity-0 cursor-pointer" />
                                                </div>
                                            )}
                                    </div>

                                    {!isEditingProfile ? (
                                        <>
                                            <h3 className="text-white font-black text-2xl uppercase tracking-wider">{currentUser.fullName}</h3>
                                            <p className="text-gold-light font-bold text-xs uppercase tracking-[0.3em] mb-8">{currentUser.position}</p>
                                            
                                            <div className="w-full space-y-4 text-left">
                                                <div className="bg-white/5 p-4 rounded-2xl border border-white/5 shadow-inner">
                                                    <div className="flex justify-between items-center">
                                                        <div>
                                                            <p className="text-[10px] font-bold text-white uppercase tracking-wider">Login Biometrik</p>
                                                            <p className="text-[8px] text-slate-400 mt-0.5">Aktifkan Face ID / Sidik Jari</p>
                                                        </div>
                                                        <div className="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                                            <input type="checkbox" name="toggle" id="bio-toggle" className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer" checked={biometricEnabled} onChange={handleToggleBiometric}/>
                                                            <label htmlFor="bio-toggle" className="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-white/5 p-4 rounded-2xl border border-white/5 shadow-inner">
                                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Nama Panggilan</p>
                                                    <p className="text-sm font-bold text-white uppercase">{currentUser.nickname}</p>
                                                </div>
                                                <div className="bg-white/5 p-4 rounded-2xl border border-white/5 shadow-inner">
                                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">NIK</p>
                                                    <p className="text-sm font-bold text-white font-mono">{currentUser.nik}</p>
                                                </div>
                                                <div className="bg-white/5 p-4 rounded-2xl border border-white/5 shadow-inner">
                                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Username</p>
                                                    <p className="text-sm font-bold text-white font-mono">{currentUser.user || currentUser.username || '-'}</p>
                                                </div>
                                                <div className="bg-white/5 p-4 rounded-2xl border border-white/5 shadow-inner">
                                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Password</p>
                                                    <p className="text-sm font-bold text-white font-mono tracking-widest">••••••</p>
                                                </div>
                                            </div>
                                            
                                            <button onClick={() => setIsEditingProfile(true)} className="mt-6 w-full btn-gold py-3 rounded-xl text-xs font-black uppercase tracking-widest shadow-xl">Edit Profil</button>
                                        </>
                                    ) : (
                                        <div className="w-full space-y-3 text-left animate-in">

                                                <label className="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-2">Nama Lengkap</label>
                                                <input name="fullName" value={editForm.fullName} onChange={handleEditProfileChange} className="w-full p-3 os-input rounded-xl text-xs" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-2">Nama Panggilan</label>
                                                <input name="nickname" value={editForm.nickname} onChange={handleEditProfileChange} className="w-full p-3 os-input rounded-xl text-xs" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-2">Jabatan</label>
                                                <select name="position" value={editForm.position} onChange={handleEditProfileChange} className="w-full p-3 os-input rounded-xl text-xs outline-none">
                                                    {jabatanOptions.map(j => <option key={j} value={j} className="text-black">{j}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-2">NIK</label>
                                                <input name="nik" value={editForm.nik} onChange={handleEditProfileChange} className="w-full p-3 os-input rounded-xl text-xs" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-2">Username</label>
                                                <input name="username" value={editForm.username} onChange={handleEditProfileChange} className="w-full p-3 os-input rounded-xl text-xs" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-2">Password</label>
                                                <input name="password" type="text" value={editForm.password} onChange={handleEditProfileChange} className="w-full p-3 os-input rounded-xl text-xs" />

                                            <div className="flex gap-2 mt-4">
                                                <button onClick={() => setIsEditingProfile(false)} className="flex-1 bg-white/10 hover:bg-white/20 text-white py-3 rounded-xl text-xs font-black uppercase tracking-widest">Batal</button>
                                                <button onClick={saveProfileChanges} className="flex-1 btn-gold py-3 rounded-xl text-xs font-black uppercase tracking-widest shadow-xl">Simpan</button>
                                            </div>
                                        </div>
                                    )}
                                    
                                    {!isEditingProfile && <div className="mt-8"><img src={logoUrl} alt="Logo" className="h-10 opacity-30 mx-auto logo-hologram transform scale-[2.5]" /></div>}
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedLog && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 modal-overlay animate-in" onClick={() => setSelectedLog(null)}>
                            <div className="os-window w-full max-w-sm p-6 rounded-[2.5rem] relative border border-white/10 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedLog(null)} className="absolute top-4 right-4 text-slate-400 hover:text-white bg-black/50 w-8 h-8 rounded-full z-10"><i className="fas fa-times"></i></button>
                                <div className="rounded-3xl overflow-hidden aspect-video bg-black border border-white/10 mb-6 shadow-2xl"><img src={selectedLog.photo} className="w-full h-full object-cover" alt="Verification" /></div>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-end border-b border-white/5 pb-4">
                                            <div><h4 className="text-gold-light font-black text-xs uppercase tracking-widest mb-1">Tipe Aktifitas</h4><p className="text-white font-bold text-lg uppercase">{selectedLog.loc.includes('Hadir') ? 'MASUK KERJA' : (selectedLog.loc.includes('Pulang') ? 'PULANG KERJA' : (selectedLog.loc.toLowerCase().includes('khusus') ? 'PRESENSI KHUSUS' : 'IZIN PETUGAS'))}</p></div>
                                            <div className="text-right"><span className="bg-emerald-500/20 text-emerald-400 text-[9px] font-black px-3 py-1 rounded-full border border-emerald-500/30 uppercase tracking-tighter">Verified</span></div>
                                    </div>
                                    {(selectedLog.loc || "").toLowerCase().includes('setengah hari') && (selectedLog.loc || "").match(/Setengah Hari\s*\(([^)]+)\)/i) && (
                                        <div className="bg-amber-900/10 p-3 rounded-xl border border-amber-500/20 text-center">
                                            <p className="text-[9px] text-amber-500 font-black uppercase tracking-widest mb-1">Durasi Kerja Setengah Hari</p>
                                            <p className="text-lg font-mono font-bold text-amber-300"><i className="fas fa-clock mr-2"></i>{(selectedLog.loc || "").match(/Setengah Hari\s*\(([^)]+)\)/i)[1]}</p>
                                        </div>
                                    )}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white/5 p-4 rounded-2xl border border-white/5"><p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Waktu</p><p className="text-sm font-bold text-white font-mono">{selectedLog.time}</p></div>
                                        <div className="bg-white/5 p-4 rounded-2xl border border-white/5"><p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Tanggal</p><p className="text-sm font-bold text-white font-mono">{selectedLog.date}</p></div>
                                    </div>
                                    <div className="bg-white/5 p-4 rounded-2xl border border-white/5">
                                        <div className="flex justify-between items-center mb-2"><p className="text-[8px] font-black text-slate-500 uppercase tracking-widest"><i className="fas fa-map-marker-alt mr-1"></i> Data Keterangan & Lokasi</p><button onClick={() => openMap(selectedLog.loc)} className="text-[8px] font-bold text-blue-400 uppercase tracking-widest hover:text-white border border-blue-500/30 px-2 py-1 rounded-lg hover:bg-blue-600 transition-all"><i className="fas fa-external-link-alt mr-1"></i> LACAK LOKASI</button></div>
                                        <div className="bg-black/40 p-3 rounded-xl border border-white/5">
                                            <p className="text-[11px] text-slate-300 font-medium leading-relaxed italic">{formatLocationData(selectedLog.loc).address}</p>
                                            <div className="flex flex-wrap gap-2 mt-2">
                                                {formatLocationData(selectedLog.loc).badges}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {selectedLog.loc.includes("Pulang") && (
                                        <div className="bg-white/10 p-3 rounded-xl border border-white/10 mt-4 text-center">
                                            <p className="text-[9px] text-slate-400 uppercase font-bold tracking-widest">Durasi Kerja</p>
                                            <p className="text-lg text-gold-light font-mono font-bold">{getWorkingDuration(selectedLog, dateSpecificLogs) || "Data Hadir Tidak Ditemukan"}</p>
                                        </div>
                                    )}
                                    
                                    <button onClick={() => setSelectedLog(null)} className="w-full btn-gold py-3 rounded-xl text-[10px] uppercase font-black tracking-widest shadow-xl mt-2">TUTUP DETAIL</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {isPhotoZoomOpen && (<div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay animate-in" onClick={() => setIsPhotoZoomOpen(false)}><div className="max-w-full max-h-full p-2 bg-white/10 rounded-3xl backdrop-blur-md shadow-2xl relative" onClick={e => e.stopPropagation()}><button onClick={() => setIsPhotoZoomOpen(false)} className="absolute -top-10 right-0 text-white text-3xl font-black">&times;</button><img src={currentUser.profilePic} className="max-w-[90vw] max-h-[80vh] rounded-2xl object-contain shadow-2xl border border-white/10" alt="Zoomed" /><div className="mt-4 text-center"><button onClick={() => setIsPhotoZoomOpen(false)} className="btn-gold px-10 py-3 rounded-xl text-[10px] uppercase font-black tracking-widest shadow-xl">Tutup Pratinjau</button></div></div></div>)}
                    <canvas ref={canvasRef} className="hidden" />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
